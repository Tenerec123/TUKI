<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T.U.K.I. KALE</title>
  <link rel="icon" type="image/svg" href="TUKI.svg">
  <link rel="stylesheet" href="/frontend/style.css">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cal-heatmap/3.3.10/cal-heatmap.css" /> 
  <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/d3/3.5.17/d3.min.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>  
  <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/cal-heatmap/3.3.10/cal-heatmap.min.js"></script>
  <style>
      #calendar {
        margin: 0 auto;
        height: 65vh;
      }
      /* --- Contenedor Principal (Dark Theme) --- */
.routine-selector {
    width: 340px; /* Ancho fijo solicitado */
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: transparent;
}

.routine-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    background: #181a1f; /* Fondo neutro oscuro oscuro */
    border: 1px solid #282c34;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
    border-left: 3px solid transparent; /* Indicador lateral desactivado */
}

/* Efecto hover limpio */
.routine-card:hover {
    background: #21252b;
    border-color: #353b45;
}

/* Estado Activo: Minimalista y directo */
.routine-card.active {
    background: #21252b;
    border-color: #353b45;
    border-left-color: #a3be8c; /* Verde técnico para el bloque activo */
}

/* Contenedor del icono Bootstrap */
.card-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    color: #61afef; /* Azul plano por defecto */
    transition: color 0.15s ease;
}

.routine-card.active .card-icon {
    color: #a3be8c; /* Cambia al color activo */
}

/* Contenido de texto */
.card-content {
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
}

.routine-title {
    color: #abb2bf;
    font-size: 0.95rem;
    font-weight: 600;
}

.routine-card.active .routine-title {
    color: #ffffff;
}

.routine-desc {
    color: #5c6370;
    font-size: 0.75rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
    </style>
</head>
<body>
  <header>
    <h1 id="title">T.U.K.I. KALE</h1>
    <h2 id="subtitle">T_ENEREC's U_NIFIED K_NOWLEDGE I_NTEGRATOR</h2>
    <div id="navbar">
      <a href="chat">CHAT</a>
      <a href="todo">TODO</a>
      <a class="unable" href="kale">KALE</a>
    </div>
  </header>

<div id="stats-container" style="display: flex; flex-direction: row; align-items: center;">
  <div class="routine-selector">
    <div class="routine-card active" data-routine="deep-work">
        <div class="card-icon">
            <i class="bi bi-code-slash"></i>
        </div>
        <div class="card-content">
            <span class="routine-title">Deep Work</span>
            <span class="routine-desc">Bloque de código sin distracciones</span>
        </div>
    </div>

    <div class="routine-card" data-routine="math-training">
        <div class="card-icon">
            <i class="bi bi-calculator"></i>
        </div>
        <div class="card-content">
            <span class="routine-title">Math & Logic</span>
            <span class="routine-desc">Resolución de problemas complejos</span>
        </div>
    </div>

    <div class="routine-card" data-routine="english-sat">
        <div class="card-icon">
            <i class="bi bi-translate"></i>
        </div>
        <div class="card-content">
            <span class="routine-title">English C1/SAT</span>
            <span class="routine-desc">Auditoría lingüística y precisión</span>
        </div>
    </div>

    <div class="routine-card" data-routine="system-review">
        <div class="card-icon">
            <i class="bi bi-diagram-3"></i>
        </div>
        <div class="card-content">
            <span class="routine-title">System Review</span>
            <span class="routine-desc">Indexación y consolidación de bloques</span>
        </div>
    </div>
  </div>

  <div class="calendar-wrapper" style="display: flex; flex-direction: row; align-items: center; width: 100%;">
        <div id="cal-heatmap-yaxislabels">
            <div>Lun</div>
            <div>Mar</div>
            <div>Mié</div>
            <div>Jue</div>
            <div>Vie</div>
            <div>Sáb</div>
            <div>Dom</div>
        </div>
        <div id="cal-heatmap"></div>
    </div>

</div>

<br>
  
  
  <div id='calendar'></div>
<script src="/frontend/kale_script.js"></script>
</body>
</html>
