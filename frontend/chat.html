<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T.U.K.I. CHAT</title>
  <link rel="icon" type="image/svg" href="TUKI.svg">
  <link rel="stylesheet" href="/frontend/style.css">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body>

<header>
  <h1 id="title">T.U.K.I. CHAT</h1>
  <h2 id="subtitle">T_ENEREC's U_NIFIED K_NOWLEDGE I_NTEGRATOR</h2>
  <div id="navbar">
    <a class="unable" href="chat">CHAT</a>
    <a href="todo">TODO</a>
    <a href="kale">KALE</a>
  </div>
</header>

<main id="chat-sidebar-container">
  <nav id="sidebar">
    <div class="sidebar-controls">
      <button id="toggle-sidebar">☰</button><br>
      <button id="create-chat" onclick="createConversation()">+</button>
    </div>
    <ul id="conversation-list">
    </ul>
      
  </nav>
  <div id="chat-container">
  </div>
  
<div id="form-container">
  <form id="prompt-form" method="post">
    <textarea id="prompt-writer" name="text" placeholder="Ask something to TUKI" rows="1"></textarea>
    
    <div class="form-controls">
      <details id="model-selector-details">
        <summary id="model-dropdown-btn" title="Seleccionar Modelo">
          <span id="model-current-name">Llama 3.3 70B</span>
          <i class="bi bi-chevron-up"></i>
        </summary>
        <ul id="model-dropdown-menu">
          <li class="model-item selected-model" data-model="meta-llama/llama-3.3-70b-instruct">Llama 3.3 70B</li>
          <li class="model-item" data-model="google/gemini-2.5-flash">Gemini 2.5 Flash</li>
          <li class="model-item" data-model="qwen/qwen-2.5-72b-instruct">Qwen 2.5 72B</li>
          <li class="model-item" data-model="deepseek/deepseek-v3">DeepSeek V3</li>
        </ul>
      </details>

      <input type="hidden" name="model" id="selected-model" value="gemini-1.5-pro">

      <button type="button" id="toggle-mic" class="btn-tuki">
        <i class="bi bi-mic"></i>
      </button>
      <button type="submit" id="submit-btn" class="btn-tuki">
        <i class="bi bi-arrow-up"></i>
      </button>
    </div>
  </form>
</div>
</main>
<script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
<script src="/frontend/chat_script.js"></script>
</body>
</html>
