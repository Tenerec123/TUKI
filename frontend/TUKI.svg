<svg width="100%" height="100%" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Círculo exterior negro carbón con borde amarillo -->
  <circle cx="100" cy="100" r="95" fill="#1a1a1a" stroke="#FFD700" stroke-width="10"/>
  
  <!-- Hexágono amarillo con bordes redondeados -->
  <polygon 
    points="100,40 150,65 150,115 100,140 50,115 50,65" 
    fill="#FFD700" 
    rx="10" 
    ry="10"
  />
  
  <!-- Círculo rojo central con bordes redondeados -->
  <circle cx="100" cy="90" r="20" fill="#FF0000"/>
</svg>